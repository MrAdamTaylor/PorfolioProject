<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klukva Games | Контакты</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="logo">
                <i class="fas fa-gamepad"></i> Klukva Games
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="portfolio.html">Portfolio</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                    <li><a href="about.html">About Us</a></li>
                </ul>
            </nav>
            <div class="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <main>
        <section id="contact-page">
            <div class="container">
                <h1 class="section-title">Свяжитесь с нами</h1>
                <div class="contact-grid">
                    <div class="contact-info">
                        <h2>Давайте создавать игры вместе</h2>
                        <p>По любым вопросам — сотрудничество, вакансии, предложения — пишите или звоните.</p>
                        <div class="contact-details">
                            <div class="contact-item">
                                <i class="fas fa-envelope"></i>
                                <span>klukva.games@studio.com</span>
                            </div>
                            <div class="contact-item">
                                <i class="fas fa-phone-alt"></i>
                                <span>+7 (999) 123-45-67</span>
                            </div>
                            <div class="contact-item">
                                <i class="fab fa-discord"></i>
                                <span>klukva_games</span>
                            </div>
                        </div>
                    </div>
                    <div class="contact-form">
                        <form action="#" method="post">
                            <input type="text" placeholder="Ваше имя" required>
                            <input type="email" placeholder="Email" required>
                            <textarea rows="5" placeholder="Сообщение..."></textarea>
                            <button type="submit" class="btn btn-primary">Отправить</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Klukva Games. Все права защищены.</p>
            <div class="social">
                <a href="#"><i class="fab fa-vk"></i></a>
                <a href="#"><i class="fab fa-telegram"></i></a>
                <a href="#"><i class="fab fa-discord"></i></a>
            </div>
        </div>
    </footer>

    <script>
        const menuBtn = document.querySelector('.mobile-menu');
        const navUl = document.querySelector('nav ul');
        menuBtn.addEventListener('click', () => {
            navUl.classList.toggle('show');
        });
    </script>
</body>
</html>
